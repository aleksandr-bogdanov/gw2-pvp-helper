<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GW2 PvP — S/D Daredevil</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Header Bar -->
    <header>
        <h1>GW2 PvP — S/D Daredevil</h1>
        <div class="header-actions">
            <button id="btn-paste" class="btn-secondary" title="Paste scoreboard screenshot (Ctrl+V)">Paste Screenshot</button>
            <button id="btn-reset" class="btn-danger">Reset</button>
        </div>
    </header>

    <main>
        <!-- Paste status -->
        <div id="paste-status" class="paste-status hidden"></div>

        <!-- Enemy Comp Strip -->
        <section class="comp-strip">
            <div id="enemy-slots" class="slot-row">
                <!-- 5 slots rendered by JS -->
            </div>
        </section>

        <!-- Inline Spec Picker (appears below slots when one is clicked) -->
        <div id="inline-picker" class="inline-picker hidden">
            <div class="picker-header">
                <input type="text" id="picker-search" class="picker-search" placeholder="Search specs...">
                <button id="picker-close" class="picker-close">&times;</button>
            </div>
            <div id="picker-options" class="picker-options"></div>
        </div>

        <!-- Strategy Banner -->
        <section id="strategy-banner" class="strategy-banner hidden">
            <div id="banner-recommendation" class="banner-recommendation"></div>
            <div id="banner-roles" class="banner-roles"></div>
        </section>

        <!-- Strategy Cards -->
        <section id="strategy-cards" class="strategy-cards"></section>

        <!-- Do Not Hit Strip -->
        <section id="do-not-hit" class="do-not-hit-strip hidden"></section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
