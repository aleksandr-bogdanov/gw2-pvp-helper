[build]
builder = "railpack"

[deploy]
startCommand = "echo PATH=$PATH && ls -la /mise/installs/node/*/bin/claude 2>&1 || true && find /mise -name claude 2>/dev/null || true && which claude 2>&1 || true && export PATH=\"$(ls -d /mise/installs/node/*/bin 2>/dev/null | head -1):$PATH\" && which claude 2>&1 || true && uv run uvicorn app:app --host 0.0.0.0 --port $PORT --no-access-log"
healthcheckPath = "/ready"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
